<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingCo | Kalıcı Paper Trading</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0e1a;color:#e0e4f0;font-family:'Segoe UI',sans-serif;padding:20px;}
        .container{max-width:1600px;margin:0 auto;}
        h1{background:linear-gradient(135deg,#f0b90b,#d97813);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
        .stats{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;}
        .stat-card{background:#1a1f30;padding:8px 16px;border-radius:12px;}
        .search-bar{display:flex;gap:10px;margin-bottom:20px;}
        .search-bar input{flex:1;background:#1a1f30;border:1px solid #2a2f45;padding:10px;border-radius:25px;color:white;}
        .refresh-btn{background:#f0b90b;border:none;padding:10px 25px;border-radius:25px;font-weight:bold;cursor:pointer;}
        .auto-trade-btn{background:#f0b90b;border:none;padding:8px 20px;border-radius:25px;font-weight:bold;cursor:pointer;}
        table{width:100%;border-collapse:collapse;}
        th{text-align:left;padding:12px;background:#111620;color:#f0b90b;}
        td{padding:10px;border-bottom:1px solid #2a2f45;}
        .price-up{color:#00c49a;}
        .price-down{color:#f6465d;}
        .signal-long{background:#00c49a20;color:#00c49a;padding:4px 12px;border-radius:20px;display:inline-block;}
        .signal-short{background:#f6465d20;color:#f6465d;padding:4px 12px;border-radius:20px;display:inline-block;}
        .signal-neutral{background:#6c729330;color:#aaa;padding:4px 12px;border-radius:20px;display:inline-block;}
        .footer{margin-top:30px;text-align:center;font-size:11px;color:#5a5f7e;}
        .table-wrapper{overflow-x:auto;}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div><h1>📈 TRADINGCO</h1><p>Kalıcı Paper Trading | Binance Futures</p></div>
        <div><button class="auto-trade-btn" id="toggleAutoTrade">🟢 OTOMATİK: KAPALI</button></div>
    </div>
    
    <div class="stats">
        <span class="stat-card">💰 Bakiye: <span id="balance">10000</span>$</span>
        <span class="stat-card">📈 K/Z: <span id="pnl">0</span>$</span>
        <span class="stat-card">🎯 Kazanç: <span id="winrate">0</span>%</span>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Coin ara">
        <button class="refresh-btn" id="refreshBtn">⟳ Yenile</button>
    </div>

    <div class="table-wrapper">
        <table id="cryptoTable">
            <thead><tr><th>#</th><th>Coin</th><th>Fiyat</th><th>24s Değişim</th><th>Sinyal</th><th>İşlem</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="6">🔄 Yükleniyor...</td></tr></tbody>
        </table>
    </div>

    <div class="footer">⚠️ Sayfa yenilense bile veriler kalıcıdır | Binance Futures | Paper Trading</div>
</div>

<script>
// ============ KALICI DEPOLAMA ============
let balance = 10000;
let trades = [];
let autoTrade = false;

function saveAll() {
    localStorage.setItem('tradingCo_balance', balance);
    localStorage.setItem('tradingCo_trades', JSON.stringify(trades));
    localStorage.setItem('tradingCo_autoTrade', autoTrade);
}

function loadAll() {
    let savedBalance = localStorage.getItem('tradingCo_balance');
    if (savedBalance !== null) balance = parseFloat(savedBalance);
    
    let savedTrades = localStorage.getItem('tradingCo_trades');
    if (savedTrades !== null) trades = JSON.parse(savedTrades);
    
    let savedAuto = localStorage.getItem('tradingCo_autoTrade');
    if (savedAuto !== null) autoTrade = savedAuto === 'true';
    
    updateUI();
}

// ============ 50+ COİN ============
const symbols = [
    "BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT", "DOGEUSDT", "ADAUSDT", "AVAXUSDT", 
    "DOTUSDT", "LINKUSDT", "MATICUSDT", "UNIUSDT", "ATOMUSDT", "NEARUSDT", "APTUSDT",
    "ARBUSDT", "OPUSDT", "SUIUSDT", "PEPEUSDT", "WIFUSDT", "FETUSDT", "AAVEUSDT",
    "ALGOUSDT", "GRTUSDT", "LDOUSDT", "MKRUSDT", "INJUSDT", "IMXUSDT", "TAOUSDT",
    "STXUSDT", "VETUSDT", "ICPUSDT", "EGLDUSDT", "FTMUSDT", "SANDUSDT", "MANAUSDT",
    "AXSUSDT", "GALAUSDT", "ENJUSDT", "CHZUSDT", "ZILUSDT", "KAVAUSDT", "EOSUSDT",
    "NEOUSDT", "XLMUSDT", "FLOWUSDT", "RUNEUSDT", "SNXUSDT", "COMPUSDT", "LTCUSDT"
];

let marketData = [];

// API'den veri çek
async function fetchData() {
    try {
        const tickerUrl = 'https://fapi.binance.com/fapi/v1/ticker/24hr';
        const priceUrl = 'https://fapi.binance.com/fapi/v1/ticker/price';
        
        const [tickerRes, priceRes] = await Promise.all([fetch(tickerUrl), fetch(priceUrl)]);
        const tickerData = await tickerRes.json();
        const priceData = await priceRes.json();
        
        const tickerMap = {};
        tickerData.forEach(t => { tickerMap[t.symbol] = t; });
        const priceMap = {};
        priceData.forEach(p => { priceMap[p.symbol] = p.price; });
        
        marketData = [];
        symbols.forEach((sym, idx) => {
            const ticker = tickerMap[sym];
            const price = parseFloat(priceMap[sym]);
            if (ticker && price) {
                const change = parseFloat(ticker.priceChangePercent);
                let signal = { text: "NÖTR", action: "HOLD", class: "signal-neutral" };
                if (change > 1.5) signal = { text: "LONG", action: "LONG", class: "signal-long" };
                else if (change < -1.5) signal = { text: "SHORT", action: "SHORT", class: "signal-short" };
                
                marketData.push({
                    id: idx + 1,
                    symbol: sym.replace("USDT", ""),
                    price: price,
                    change: change,
                    signal: signal
                });
            }
        });
        
        marketData.sort((a,b) => b.price - a.price);
        renderTable();
        document.getElementById('totalCoins').innerText = marketData.length;
    } catch(e) {
        console.error(e);
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="6">❌ API Hatası</td></tr>';
    }
}

// İşlem aç
function executeTrade(coin, action, price) {
    if (!autoTrade) return;
    if (action === "HOLD") return;
    
    const tradeAmount = 10;
    const leverage = 10;
    const positionValue = tradeAmount * leverage;
    const isWin = Math.random() * 100 < 65;
    let pnl = isWin ? positionValue * 0.04 : -positionValue * 0.02;
    
    balance += pnl;
    trades.unshift({
        coin: coin,
        action: action,
        price: price,
        pnl: pnl.toFixed(2),
        isWin: isWin,
        time: new Date().toLocaleTimeString()
    });
    if (trades.length > 20) trades.pop();
    
    saveAll();
    updateUI();
}

function renderTable() {
    const search = document.getElementById('searchInput').value.toUpperCase();
    const filtered = marketData.filter(d => d.symbol.includes(search));
    const tbody = document.getElementById('tableBody');
    
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">🔍 Coin bulunamadı</td></tr>';
        return;
    }
    
    tbody.innerHTML = filtered.map(d => {
        const changeClass = d.change >= 0 ? 'price-up' : 'price-down';
        const changeSym = d.change >= 0 ? '▲' : '▼';
        return `<tr>
            <td>${d.id}</td>
            <td><strong>${d.symbol}</strong></td>
            <td>$${d.price.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
            <td class="${changeClass}">${changeSym} ${Math.abs(d.change).toFixed(2)}%</td>
            <td><span class="${d.signal.class}">${d.signal.text}</span></td>
            <td><button class="refresh-btn" style="padding:4px 12px;font-size:11px;" onclick="manualTrade('${d.symbol}','${d.signal.action}',${d.price})">${d.signal.action === "LONG" ? "📈 AL" : d.signal.action === "SHORT" ? "📉 SAT" : "⏸️"}</button></td>
        </tr>`;
    }).join('');
}

function updateUI() {
    document.getElementById('balance').innerHTML = balance.toFixed(0);
    const totalPnL = balance - 10000;
    document.getElementById('pnl').innerHTML = (totalPnL >= 0 ? '+' : '') + totalPnL.toFixed(2);
    const winCount = trades.filter(t => t.isWin).length;
    const winRate = trades.length > 0 ? (winCount / trades.length * 100).toFixed(0) : 0;
    document.getElementById('winrate').innerHTML = winRate;
}

function manualTrade(symbol, action, price) {
    if (action === "HOLD") { alert("Sinyal yok!"); return; }
    executeTrade(symbol, action, price);
    alert(`${symbol} ${action} işlemi açıldı!`);
    updateUI();
}

// Otomatik işlem döngüsü
let autoInterval;
function startAutoLoop() {
    if (autoInterval) clearInterval(autoInterval);
    autoInterval = setInterval(() => {
        if (autoTrade && marketData.length > 0) {
            const best = marketData.find(d => d.signal.action !== "HOLD");
            if (best) executeTrade(best.symbol, best.signal.action, best.price);
        }
    }, 60000);
}

// Eventler
document.getElementById('toggleAutoTrade').onclick = () => {
    autoTrade = !autoTrade;
    saveAll();
    const btn = document.getElementById('toggleAutoTrade');
    btn.innerHTML = autoTrade ? "🔴 OTOMATİK: AÇIK" : "🟢 OTOMATİK: KAPALI";
    btn.style.background = autoTrade ? "#f6465d" : "#f0b90b";
    if (autoTrade) startAutoLoop();
};
document.getElementById('refreshBtn').onclick = () => fetchData();
document.getElementById('searchInput').oninput = () => renderTable();

// Başlat
loadAll();
fetchData();
setInterval(fetchData, 30000);
startAutoLoop();
updateUI();
</script>
</body>
</html>
