<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingCo | Kalıcı Paper Trading</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0e1a;color:#e0e4f0;font-family:'Segoe UI',sans-serif;padding:20px;}
        .container{max-width:1400px;margin:0 auto;}
        h1{background:linear-gradient(135deg,#f0b90b,#d97813);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
        .stats{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap;}
        .stat-card{background:#1a1f30;padding:10px 20px;border-radius:12px;}
        .search-bar{display:flex;gap:10px;margin-bottom:20px;}
        .search-bar input{flex:1;background:#1a1f30;border:1px solid #2a2f45;padding:10px;border-radius:25px;color:white;}
        .refresh-btn{background:#f0b90b;border:none;padding:10px 20px;border-radius:25px;font-weight:bold;cursor:pointer;}
        .auto-trade-btn{background:#f0b90b;border:none;padding:8px 20px;border-radius:25px;font-weight:bold;cursor:pointer;}
        table{width:100%;border-collapse:collapse;}
        th{text-align:left;padding:12px;background:#111620;color:#f0b90b;}
        td{padding:10px;border-bottom:1px solid #2a2f45;}
        .price-up{color:#00c49a;}
        .price-down{color:#f6465d;}
        .signal-long{background:#00c49a20;color:#00c49a;padding:4px 12px;border-radius:20px;display:inline-block;}
        .signal-short{background:#f6465d20;color:#f6465d;padding:4px 12px;border-radius:20px;display:inline-block;}
        .signal-neutral{background:#6c729330;color:#aaa;padding:4px 12px;border-radius:20px;display:inline-block;}
        .trade-history{background:#111620;border-radius:12px;padding:12px;margin-top:20px;max-height:200px;overflow-y:auto;}
        .trade-item{padding:8px;border-bottom:1px solid #2a2f45;font-size:12px;}
        .trade-win{color:#00c49a;}
        .trade-loss{color:#f6465d;}
        .footer{margin-top:30px;text-align:center;font-size:11px;color:#5a5f7e;}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div><h1>📈 TRADINGCO</h1><p>Kalıcı Paper Trading | Binance Futures</p></div>
        <div><button class="auto-trade-btn" id="autoTradeBtn">🟢 OTOMATİK: KAPALI</button></div>
    </div>
    
    <div class="stats">
        <span class="stat-card">💰 Bakiye: <span id="balance">10000</span>$</span>
        <span class="stat-card">📈 K/Z: <span id="pnl">0</span>$</span>
        <span class="stat-card">🎯 Kazanç: <span id="winrate">0</span>%</span>
        <span class="stat-card">📊 Toplam Coin: <span id="totalCoins">0</span></span>
    </div>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Coin ara (BTC, ETH, SOL...)">
        <button class="refresh-btn" id="refreshBtn">⟳ Yenile</button>
    </div>

    <div style="overflow-x:auto">
        <table id="cryptoTable">
            <thead>
                <tr><th>#</th><th>Coin</th><th>Fiyat (USDT)</th><th>24s Değişim</th><th>Sinyal</th><th>İşlem</th></tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" style="text-align:center">🔄 Yükleniyor...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="trade-history">
        <strong>📋 İşlem Geçmişi (Son 15)</strong>
        <div id="historyList">Henüz işlem yok</div>
    </div>

    <div class="footer">⚠️ Sayfa yenilense bile veriler KALICI | Binance Futures | Paper Trading</div>
</div>

<script>
// ============================================================
// 1. GLOBAL DEĞİŞKENLER
// ============================================================
let balance = 10000;
let trades = [];
let autoTrade = false;

// ============================================================
// 2. LOCALSTORAGE İŞLEMLERİ (KALICI VERİ)
// ============================================================
function saveToLocalStorage() {
    localStorage.setItem('tradingco_balance', balance);
    localStorage.setItem('tradingco_trades', JSON.stringify(trades));
    localStorage.setItem('tradingco_autotrade', autoTrade);
    console.log("✅ Kaydedildi - Bakiye:", balance, "İşlem:", trades.length);
}

function loadFromLocalStorage() {
    let savedBalance = localStorage.getItem('tradingco_balance');
    let savedTrades = localStorage.getItem('tradingco_trades');
    let savedAuto = localStorage.getItem('tradingco_autotrade');
    
    if (savedBalance !== null) balance = parseFloat(savedBalance);
    if (savedTrades !== null) trades = JSON.parse(savedTrades);
    if (savedAuto !== null) autoTrade = savedAuto === 'true';
    
    console.log("✅ Yüklendi - Bakiye:", balance, "İşlem:", trades.length, "Auto:", autoTrade);
    updateUI();
}

// ============================================================
// 3. COİN LİSTESİ (Binance Futures)
// ============================================================
const coinList = [
    "BTCUSDT", "ETHUSDT", "SOLUSDT", "XRPUSDT", "DOGEUSDT", "ADAUSDT", "AVAXUSDT",
    "DOTUSDT", "LINKUSDT", "MATICUSDT", "UNIUSDT", "ATOMUSDT", "NEARUSDT", "APTUSDT",
    "ARBUSDT", "OPUSDT", "SUIUSDT", "PEPEUSDT", "WIFUSDT", "FETUSDT", "AAVEUSDT",
    "ALGOUSDT", "GRTUSDT", "LDOUSDT", "MKRUSDT", "INJUSDT", "IMXUSDT", "STXUSDT",
    "VETUSDT", "ICPUSDT", "FTMUSDT", "SANDUSDT", "MANAUSDT", "AXSUSDT", "GALAUSDT"
];

let marketData = [];

// ============================================================
// 4. BINANCE FUTURES API
// ============================================================
async function fetchBinanceData() {
    try {
        const [tickerRes, priceRes] = await Promise.all([
            fetch('https://fapi.binance.com/fapi/v1/ticker/24hr'),
            fetch('https://fapi.binance.com/fapi/v1/ticker/price')
        ]);
        
        const tickerData = await tickerRes.json();
        const priceData = await priceRes.json();
        
        const tickerMap = {};
        tickerData.forEach(t => tickerMap[t.symbol] = t);
        const priceMap = {};
        priceData.forEach(p => priceMap[p.symbol] = p.price);
        
        marketData = [];
        coinList.forEach((symbol, idx) => {
            const ticker = tickerMap[symbol];
            const price = parseFloat(priceMap[symbol]);
            
            if (ticker && price) {
                const change24h = parseFloat(ticker.priceChangePercent);
                let signal = { text: "NÖTR", action: "HOLD", class: "signal-neutral" };
                
                if (change24h > 1.5) signal = { text: "LONG ▲", action: "LONG", class: "signal-long" };
                else if (change24h < -1.5) signal = { text: "SHORT ▼", action: "SHORT", class: "signal-short" };
                
                marketData.push({
                    id: idx + 1,
                    name: symbol.replace("USDT", ""),
                    symbol: symbol,
                    price: price,
                    change: change24h,
                    signal: signal
                });
            }
        });
        
        marketData.sort((a,b) => b.price - a.price);
        renderTable();
        document.getElementById('totalCoins').innerText = marketData.length;
        
    } catch (error) {
        console.error("API Hatası:", error);
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="6">❌ Bağlantı hatası</td></tr>';
    }
}

// ============================================================
// 5. İŞLEM AÇMA
// ============================================================
function openTrade(coin, action, price) {
    if (!autoTrade) {
        alert("Önce 'Otomatik İşlem: AÇIK' yapın!");
        return false;
    }
    if (action === "HOLD") {
        alert("Bu coin için sinyal yok!");
        return false;
    }
    
    const tradeAmount = 10;
    const leverage = 10;
    const positionValue = tradeAmount * leverage;
    const winChance = 68;
    const isWin = Math.random() * 100 < winChance;
    
    let pnl = 0;
    if (isWin) pnl = positionValue * 0.045;
    else pnl = -positionValue * 0.025;
    
    balance += pnl;
    
    trades.unshift({
        coin: coin,
        action: action,
        price: price,
        pnl: pnl.toFixed(2),
        isWin: isWin,
        time: new Date().toLocaleTimeString()
    });
    
    if (trades.length > 20) trades.pop();
    
    saveToLocalStorage();
    updateUI();
    renderTradeHistory();
    
    console.log(`İşlem: ${coin} ${action} | K/Z: ${pnl.toFixed(2)}`);
    return true;
}

// ============================================================
// 6. ARAYÜZ GÜNCELLEMELERİ
// ============================================================
function renderTable() {
    const searchTerm = document.getElementById('searchInput').value.toUpperCase();
    const filtered = marketData.filter(d => d.name.includes(searchTerm));
    const tbody = document.getElementById('tableBody');
    
    if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">🔍 Coin bulunamadı</td></tr>';
        return;
    }
    
    tbody.innerHTML = filtered.map(d => {
        const changeClass = d.change >= 0 ? 'price-up' : 'price-down';
        const changeSymbol = d.change >= 0 ? '▲' : '▼';
        return `
            <tr>
                <td>${d.id}</td>
                <td><strong>${d.name}</strong></td>
                <td>$${d.price.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                <td class="${changeClass}">${changeSymbol} ${Math.abs(d.change).toFixed(2)}%</td>
                <td><span class="${d.signal.class}">${d.signal.text}</span></td>
                <td><button class="refresh-btn" style="padding:4px 12px;font-size:11px;" onclick="manualTrade('${d.name}','${d.signal.action}',${d.price})">${d.signal.action === "LONG" ? "📈 AL" : d.signal.action === "SHORT" ? "📉 SAT" : "⏸️"}</button></td>
            </tr>
        `;
    }).join('');
}

function renderTradeHistory() {
    const historyDiv = document.getElementById('historyList');
    if (trades.length === 0) {
        historyDiv.innerHTML = 'Henüz işlem yok';
        return;
    }
    
    historyDiv.innerHTML = trades.slice(0, 15).map(t => `
        <div class="trade-item">
            <span class="${t.isWin ? 'trade-win' : 'trade-loss'}">${t.isWin ? '✅' : '❌'} ${t.coin}</span>
            <span>${t.action}</span>
            <span>Giriş: $${t.price}</span>
            <span>K/Z: ${t.pnl >= 0 ? '+' : ''}$${t.pnl}</span>
            <span>${t.time}</span>
        </div>
    `).join('');
}

function updateUI() {
    document.getElementById('balance').innerHTML = balance.toFixed(0);
    const totalPnl = balance - 10000;
    document.getElementById('pnl').innerHTML = (totalPnl >= 0 ? '+' : '') + totalPnl.toFixed(2);
    const winCount = trades.filter(t => t.isWin).length;
    const winRate = trades.length > 0 ? (winCount / trades.length * 100).toFixed(0) : 0;
    document.getElementById('winrate').innerHTML = winRate;
}

// ============================================================
// 7. MANUEL VE OTOMATİK İŞLEM
// ============================================================
function manualTrade(coin, action, price) {
    openTrade(coin, action, price);
    updateUI();
    renderTradeHistory();
}

let autoInterval = null;

function startAutoTrading() {
    if (autoInterval) clearInterval(autoInterval);
    autoInterval = setInterval(() => {
        if (autoTrade && marketData.length > 0) {
            const bestSignal = marketData.find(d => d.signal.action !== "HOLD");
            if (bestSignal) {
                openTrade(bestSignal.name, bestSignal.signal.action, bestSignal.price);
                renderTable();
            }
        }
    }, 60000);
}

// ============================================================
// 8. EVENT LİSTENERLAR
// ============================================================
document.getElementById('autoTradeBtn').onclick = () => {
    autoTrade = !autoTrade;
    saveToLocalStorage();
    const btn = document.getElementById('autoTradeBtn');
    btn.innerHTML = autoTrade ? "🔴 OTOMATİK: AÇIK" : "🟢 OTOMATİK: KAPALI";
    btn.style.background = autoTrade ? "#f6465d" : "#f0b90b";
    if (autoTrade) startAutoTrading();
    else if (autoInterval) clearInterval(autoInterval);
};

document.getElementById('refreshBtn').onclick = () => {
    fetchBinanceData();
};
document.getElementById('searchInput').oninput = () => renderTable();

// ============================================================
// 9. BAŞLAT
// ============================================================
loadFromLocalStorage();
fetchBinanceData();
setInterval(fetchBinanceData, 30000);
renderTradeHistory();
startAutoTrading();
</script>
</body>
</html>
