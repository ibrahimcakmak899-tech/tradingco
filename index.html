<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingCo | Hızlı Analiz</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0e1a;color:#e0e4f0;font-family:'Segoe UI',sans-serif;padding:15px;}
        .container{max-width:1400px;margin:0 auto;}
        h1{background:linear-gradient(135deg,#f0b90b,#d97813);-webkit-background-clip:text;background-clip:text;color:transparent;display:inline-block;}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:15px;gap:10px;}
        .stat-card{background:#1a1f30;padding:6px 12px;border-radius:12px;display:inline-block;margin-right:10px;font-size:13px;}
        .risk-buttons{display:flex;gap:8px;margin-bottom:15px;flex-wrap:wrap;}
        .risk-btn{background:#1a1f30;border:1px solid #2a2f45;padding:6px 15px;border-radius:25px;cursor:pointer;font-size:12px;}
        .risk-btn.active{background:#f0b90b;color:#0a0e1a;border:none;font-weight:bold;}
        .search-bar{display:flex;gap:8px;margin-bottom:15px;}
        .search-bar input{flex:1;background:#1a1f30;border:1px solid #2a2f45;padding:8px 15px;border-radius:25px;color:white;outline:none;}
        .refresh-btn{background:#f0b90b;border:none;padding:8px 20px;border-radius:25px;font-weight:bold;cursor:pointer;}
        .auto-trade-btn{background:#f0b90b;border:none;padding:6px 15px;border-radius:25px;font-weight:bold;cursor:pointer;font-size:12px;}
        table{width:100%;border-collapse:collapse;}
        th{text-align:left;padding:10px;background:#111620;color:#f0b90b;font-size:12px;}
        td{padding:8px 10px;border-bottom:1px solid #2a2f4520;font-size:12px;}
        tr:hover{background:#f0b90b10;}
        .price-up{color:#00c49a;}
        .price-down{color:#f6465d;}
        .signal-badge{display:inline-block;padding:3px 8px;border-radius:15px;font-size:10px;font-weight:bold;}
        .signal-strong-buy{background:#00c49a30;color:#00c49a;}
        .signal-buy{background:#00c49a20;color:#4ecdc4;}
        .signal-neutral{background:#6c729330;color:#aaa;}
        .signal-sell{background:#f6465d20;color:#ff6b6b;}
        .signal-strong-sell{background:#f6465d30;color:#f6465d;}
        .trade-history{background:#111620;border-radius:10px;padding:10px;margin-top:15px;max-height:150px;overflow-y:auto;font-size:11px;}
        .trade-item{padding:5px;border-bottom:1px solid #2a2f45;}
        .trade-win{color:#00c49a;}
        .trade-loss{color:#f6465d;}
        .footer{margin-top:20px;text-align:center;font-size:10px;color:#5a5f7e;}
        .table-wrapper{overflow-x:auto;max-height:450px;overflow-y:auto;}
        @media (max-width:768px){th,td{padding:5px;font-size:10px;}}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div><h1>📈 TRADINGCO</h1><p style="font-size:11px;">Hızlı Analiz | 30 Coin</p></div>
        <div><button class="auto-trade-btn" id="toggleAutoTrade">🟢 OTOMATİK: KAPALI</button></div>
    </div>
    
    <div class="stats">
        <span class="stat-card">💰 Bakiye: <span id="balance">10000</span>$</span>
        <span class="stat-card">📈 K/Z: <span id="pnl">0</span>$</span>
        <span class="stat-card">🎯 Kazanç: <span id="winrate">0</span>%</span>
    </div>

    <div class="risk-buttons">
        <button class="risk-btn active" data-risk="all">📊 Tümü</button>
        <button class="risk-btn" data-risk="high">🟢 Güçlü (75+)</button>
        <button class="risk-btn" data-risk="medium">🟡 Orta (60-74)</button>
    </div>

    <div class="search-bar">
        <input type="text" id="search" placeholder="🔍 Ara (BTC, ETH, PEPE...)">
        <button class="refresh-btn" id="refresh">⟳</button>
    </div>

    <div class="table-wrapper">
        <table>
            <thead><tr><th>#</th><th>Coin</th><th>Fiyat</th><th>24s</th><th>Skor</th><th>Sinyal</th><th>İşlem</th></tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <div class="trade-history" id="historyDiv">
        <strong>📋 Son İşlemler</strong>
        <div id="historyList">Henüz işlem yok</div>
    </div>

    <div class="footer">⚠️ Eğitim amaçlıdır | Paper Trading | Yatırım tavsiyesi değildir</div>
</div>

<script>
// ============ 30 COIN (HIZLI) ============
const coins = ["BTC","ETH","SOL","XRP","DOGE","ADA","AVAX","DOT","LINK","MATIC","UNI","ATOM","NEAR","APT","ARB","SUI","PEPE","WIF","FET","AAVE","ALGO","GRT","LDO","MKR","INJ","VET","ICP","FTM","SAND","MANA"];

let balance = 10000;
let trades = [];
let autoTrade = false;
let riskFilter = "all";
let marketData = [];

// Fiyatlar
const prices = {BTC:61500,ETH:3350,SOL:148,XRP:0.53,DOGE:0.124,ADA:0.44,AVAX:35.5,DOT:7.0,LINK:17.2,MATIC:0.67,UNI:9.7,ATOM:8.8,NEAR:5.0,APT:8.3,ARB:1.07,SUI:1.04,PEPE:0.0000118,WIF:1.85,FET:1.07,AAVE:83,ALGO:0.173,GRT:0.21,LDO:2.1,MKR:1850,INJ:28.5,VET:0.0285,ICP:10.8,FTM:0.65,SAND:0.45,MANA:0.52};

function randomChange(){return (Math.random()*10-5).toFixed(1);}

function getScore(change){
    let s=50;
    if(change>2)s+=25; else if(change>0)s+=10;
    else if(change<-2)s-=25; else if(change<0)s-=10;
    return Math.min(100,Math.max(0,Math.round(s)));
}

function getSignal(score){
    if(score>=75)return{text:"GÜÇLÜ AL",class:"signal-strong-buy",action:"LONG"};
    if(score>=60)return{text:"AL",class:"signal-buy",action:"LONG"};
    if(score>=40)return{text:"NÖTR",class:"signal-neutral",action:"HOLD"};
    if(score>=25)return{text:"SAT",class:"signal-sell",action:"SHORT"};
    return{text:"GÜÇLÜ SAT",class:"signal-strong-sell",action:"SHORT"};
}

function executeTrade(symbol, action, price, score){
    if(!autoTrade) return false;
    if(riskFilter==="high" && score<75) return false;
    if(riskFilter==="medium" && (score<60 || score>=75)) return false;
    
    let successProb = score>=75?85:score>=60?70:score>=40?50:35;
    let isWin = Math.random()*100 < successProb;
    let pnl = isWin ? 4.5 : -3.5;
    balance += pnl;
    
    trades.unshift({symbol,action,price,pnl:pnl.toFixed(2),isWin,time:new Date().toLocaleTimeString()});
    if(trades.length>15) trades.pop();
    updateUI();
    return true;
}

function updateUI(){
    document.getElementById("balance").innerHTML = balance.toFixed(0);
    let totalPnL = balance-10000;
    document.getElementById("pnl").innerHTML = (totalPnL>=0?"+":"")+totalPnL.toFixed(2);
    let winCount = trades.filter(t=>t.isWin).length;
    let winRate = trades.length>0 ? (winCount/trades.length*100).toFixed(0) : 0;
    document.getElementById("winrate").innerHTML = winRate;
    
    let historyHtml = trades.slice(0,10).map(t=>`<div class="trade-item"><span class="${t.isWin?'trade-win':'trade-loss'}">${t.isWin?'✅':'❌'} ${t.symbol}</span> ${t.action} $${t.pnl} ${t.time}</div>`).join("");
    document.getElementById("historyList").innerHTML = historyHtml || "Henüz işlem yok";
}

function fetchData(){
    marketData = coins.map((c,idx)=>{
        let price = prices[c] || 10;
        let change = parseFloat(randomChange());
        let score = getScore(change);
        let signal = getSignal(score);
        
        if(autoTrade && signal.action !== "HOLD"){
            executeTrade(c, signal.action, price, score);
        }
        
        return {id:idx+1, symbol:c, price:price, change:change, score:score, signal:signal};
    });
    marketData.sort((a,b)=>b.score - a.score);
    renderTable();
}

function renderTable(){
    let search = document.getElementById("search").value.toUpperCase();
    let filtered = marketData.filter(d=>{
        if(riskFilter==="high") return d.score>=75 && d.symbol.includes(search);
        if(riskFilter==="medium") return d.score>=60 && d.score<75 && d.symbol.includes(search);
        return d.symbol.includes(search);
    });
    
    let html = filtered.map(d=>{
        let changeClass = d.change>=0?"price-up":"price-down";
        let changeSym = d.change>=0?"▲":"▼";
        let btnText = d.signal.action==="LONG"?"📈":d.signal.action==="SHORT"?"📉":"⏸️";
        return `<tr>
            <td>${d.id}</td>
            <td><b>${d.symbol}</b></td>
            <td>$${d.price.toFixed(d.price<0.01?6:d.price<1?4:2)}</td>
            <td class="${changeClass}">${changeSym} ${Math.abs(d.change)}%</td>
            <td><b>${d.score}</b></td>
            <td><span class="signal-badge ${d.signal.class}">${d.signal.text}</span></td>
            <td><button class="refresh-btn" style="padding:2px 8px;font-size:10px;" onclick="manualTrade('${d.symbol}','${d.signal.action}',${d.price},${d.score})">${btnText}</button></td>
        </tr>`;
    }).join("");
    document.getElementById("tbody").innerHTML = html || '<tr><td colspan="7">Coin bulunamadı</td></tr>';
}

function manualTrade(symbol, action, price, score){
    if(action==="HOLD"){alert("Sinyal yok!");return;}
    executeTrade(symbol, action, price, score);
    alert(`${symbol} ${action} işlemi açıldı!`);
    fetchData();
}

// Eventler
document.getElementById("toggleAutoTrade").onclick = ()=>{
    autoTrade = !autoTrade;
    let btn = document.getElementById("toggleAutoTrade");
    btn.innerHTML = autoTrade ? "🔴 OTOMATİK: AÇIK" : "🟢 OTOMATİK: KAPALI";
    btn.style.background = autoTrade ? "#f6465d" : "#f0b90b";
};

document.querySelectorAll(".risk-btn").forEach(btn=>{
    btn.onclick = ()=>{
        document.querySelectorAll(".risk-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        riskFilter = btn.dataset.risk;
        renderTable();
    };
});

document.getElementById("refresh").onclick = ()=>{fetchData();};
document.getElementById("search").oninput = ()=>{renderTable();};

fetchData();
setInterval(fetchData, 25000);
</script>
</body>
</html>
